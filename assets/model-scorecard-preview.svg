<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">OpenCode Model Scorecard preview</title>
  <desc id="desc">Terminal preview showing the model score, token cost, and token efficiency line on an OpenCode home screen.</desc>
  <rect width="960" height="360" rx="18" fill="#111318"/>
  <rect x="24" y="24" width="912" height="312" rx="10" fill="#181b21" stroke="#31363f"/>
  <circle cx="52" cy="50" r="6" fill="#ff5f57"/>
  <circle cx="74" cy="50" r="6" fill="#febc2e"/>
  <circle cx="96" cy="50" r="6" fill="#28c840"/>
  <text x="40" y="95" fill="#d9dde5" font-family="Menlo, Consolas, monospace" font-size="20">OpenCode</text>
  <text x="40" y="137" fill="#8f98a8" font-family="Menlo, Consolas, monospace" font-size="16">current model: anthropic/claude-sonnet-4.5</text>
  <rect x="40" y="188" width="880" height="58" rx="7" fill="#20242c" stroke="#3d4552"/>
  <text x="62" y="224" fill="#9ee493" font-family="Menlo, Consolas, monospace" font-size="19">model score: 77</text>
  <text x="238" y="224" fill="#d9dde5" font-family="Menlo, Consolas, monospace" font-size="19">| token cost (in / out): $5.00 / $25.01 per 1M</text>
  <text x="746" y="224" fill="#78b7ff" font-family="Menlo, Consolas, monospace" font-size="19">| efficiency: 0.08</text>
  <text x="40" y="289" fill="#8f98a8" font-family="Menlo, Consolas, monospace" font-size="15">Command palette: Show model benchmark details</text>
</svg>
